name: Daily LLM Quality Tests

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Comma-separated provider list (leave empty for defaults)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run quality tests
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        CANARY_DISCORD_WEBHOOK: ${{ secrets.CANARY_DISCORD_WEBHOOK }}
        CANARY_SLACK_WEBHOOK: ${{ secrets.CANARY_SLACK_WEBHOOK }}
      run: |
        PROVIDERS="${{ github.event.inputs.providers || 'openai/gpt-4o,anthropic/claude-3.5-sonnet,google/gemini-2.0-flash-thinking-exp' }}"
        python runner.py --providers "$PROVIDERS"
    
    - name: Generate report
      run: |
        python runner.py --report > daily-report.txt
    
    - name: Commit results
      run: |
        git config --local user.email "canary@github-actions"
        git config --local user.name "Canary Bot"
        git add drift.db
        git diff --quiet && git diff --staged --quiet || git commit -m "📊 Daily quality test results - $(date -u +%Y-%m-%d)"
    
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
